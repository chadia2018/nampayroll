services:
  - type: web
    name: namibia-payroll-desk
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: payroll-data
      mountPath: /var/data
      sizeGB: 2
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: DATA_DIR
        value: /var/data
